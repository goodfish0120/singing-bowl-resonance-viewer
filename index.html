<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Singing Bowl Resonance Tuner</title>
<style>
:root{
  --bg:#05070a;
  --card:#0a1018;
  --card2:#0d1622;
  --text:#f8fafc;
  --muted:#91a3b8;
  --dim:#536274;
  --line:#34d399;
  --line2:#7dd3fc;
  --yellow:#facc15;
  --red:#fb7185;
  --grid:rgba(148,163,184,.16);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
body{overflow-x:hidden}
button{font:inherit}
#app{min-height:100%;background:radial-gradient(circle at 50% -10%,rgba(52,211,153,.12),transparent 34%),var(--bg)}
.hero{min-height:100svh;display:flex;flex-direction:column;padding:calc(env(safe-area-inset-top) + 10px) 10px calc(env(safe-area-inset-bottom) + 10px);gap:10px}
.topbar{height:30px;display:flex;align-items:center;gap:10px;color:var(--muted);font-size:11px;letter-spacing:.08em;text-transform:uppercase;font-weight:760}.brand{color:#dbeafe;white-space:nowrap}.spacer{flex:1}.status{color:var(--line);text-align:right;white-space:nowrap;font-variant-numeric:tabular-nums}
.tunerStage{position:relative;flex:1;min-height:0;display:flex;flex-direction:column;gap:10px}
.tunerCard{position:relative;flex:1;min-height:310px;border:1px solid rgba(148,163,184,.18);border-radius:24px;background:linear-gradient(180deg,rgba(15,23,42,.92),rgba(2,6,23,.98));box-shadow:inset 0 1px 0 rgba(255,255,255,.04),0 18px 70px rgba(0,0,0,.28);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:18px 14px;overflow:hidden}
.readout{width:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}.smallLabel{font-size:11px;color:var(--muted);letter-spacing:.18em;text-transform:uppercase;font-weight:780}.freq{font-size:clamp(76px,28vw,145px);line-height:.9;font-weight:880;letter-spacing:-.085em;font-variant-numeric:tabular-nums;text-shadow:0 0 38px rgba(52,211,153,.12)}.freq .unit{font-size:.2em;letter-spacing:.02em;color:var(--muted);margin-left:8px;font-weight:760}.note{font-size:clamp(30px,10.5vw,58px);line-height:1.05;font-weight:840;letter-spacing:-.035em;color:#e2e8f0;font-variant-numeric:tabular-nums}.note .cents{color:var(--muted);font-weight:740;margin-left:10px}.meter{width:min(620px,94%);height:112px;margin-top:12px;position:relative}.meterCanvas{width:100%;height:100%;display:block}.meterLabels{position:absolute;left:0;right:0;bottom:1px;display:flex;justify-content:space-between;color:var(--dim);font-size:10px;font-weight:680;padding:0 10px;pointer-events:none}.meterCenter{position:absolute;left:50%;top:0;bottom:12px;width:1px;background:rgba(255,255,255,.36);box-shadow:0 0 12px rgba(255,255,255,.18)}
.tunerMeta{position:absolute;left:14px;right:14px;bottom:12px;display:flex;align-items:end;gap:8px;color:var(--muted);font-size:11px}.clipWarn{color:var(--red);font-weight:780;opacity:0;transition:.2s}.clipWarn.show{opacity:1}.sustainBadge{margin-left:auto;color:#e2e8f0;font-weight:780;font-variant-numeric:tabular-nums}
.enableTap{position:absolute;left:50%;bottom:50px;transform:translateX(-50%);z-index:5;display:flex;flex-direction:column;align-items:center;gap:7px;pointer-events:none}.enableBtn{pointer-events:auto;border:1px solid rgba(255,255,255,.18);border-radius:999px;padding:12px 18px;background:rgba(248,250,252,.96);color:#020617;font-weight:860;box-shadow:0 14px 40px rgba(0,0,0,.32)}.enableNote{font-size:11px;color:var(--muted);background:rgba(2,6,23,.55);border:1px solid rgba(148,163,184,.14);border-radius:999px;padding:5px 9px}.enableTap.hidden{display:none}
.spectrumCard{height:clamp(118px,22svh,180px);border:1px solid rgba(148,163,184,.16);border-radius:22px;background:linear-gradient(180deg,rgba(13,22,34,.95),rgba(2,6,23,.98));overflow:hidden;position:relative}.spectrumCanvas{width:100%;height:100%;display:block}.spectrumTitle{position:absolute;left:12px;top:9px;color:rgba(219,234,254,.82);font-size:10px;letter-spacing:.12em;text-transform:uppercase;font-weight:800}.spectrumHint{position:absolute;right:12px;top:9px;color:rgba(145,163,184,.82);font-size:10px;font-variant-numeric:tabular-nums}.scrollCue{text-align:center;color:var(--muted);font-size:11px;margin-top:-2px;letter-spacing:.06em}
.fingerprintSection{min-height:100svh;padding:calc(env(safe-area-inset-top) + 14px) 10px calc(env(safe-area-inset-bottom) + 18px);display:flex;flex-direction:column;gap:10px;background:linear-gradient(180deg,#05070a,#020617)}.sectionHeader{display:flex;align-items:end;gap:10px}.sectionTitle{font-size:18px;font-weight:860;letter-spacing:-.02em;color:#e5eefb}.sectionActions{margin-left:auto;display:flex;align-items:center;gap:8px}.refreshBtn{border:1px solid rgba(125,211,252,.32);border-radius:999px;padding:8px 11px;background:rgba(15,23,42,.78);color:#e0f2fe;font-size:11px;font-weight:820;letter-spacing:.03em;box-shadow:inset 0 1px 0 rgba(255,255,255,.05)}.refreshBtn:active{transform:translateY(1px);background:rgba(14,165,233,.18)}.sectionSub{text-align:right;color:var(--muted);font-size:11px;line-height:1.3;font-variant-numeric:tabular-nums}.fingerPanel{flex:1;min-height:300px;border:1px solid rgba(148,163,184,.18);border-radius:22px;background:linear-gradient(180deg,rgba(15,23,42,.92),rgba(2,6,23,.98));padding:10px;display:flex;flex-direction:column;gap:10px}.graphWrap{position:relative;flex:1;min-height:240px;border-radius:16px;background:rgba(2,6,23,.55);border:1px solid rgba(148,163,184,.12);overflow:hidden}.graphCanvas{width:100%;height:100%;display:block}.dataGrid{display:grid;grid-template-columns:1fr;gap:8px}.dataBox{border:1px solid rgba(148,163,184,.14);background:rgba(15,23,42,.62);border-radius:15px;padding:10px 11px;min-width:0}.dataTitle{font-size:10px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;font-weight:780;margin-bottom:6px}.dataLine{font-size:12px;line-height:1.48;font-variant-numeric:tabular-nums;color:#e5eefb;word-break:break-word}.dataLine.muted{color:var(--muted)}.peakCount{font-size:32px;line-height:1;font-weight:860;color:#f8fafc;margin-right:7px}.peakCountLine{display:flex;align-items:baseline;color:var(--muted);font-size:12px}
@media (min-width:760px) and (orientation:landscape){
  .hero{padding-left:14px;padding-right:14px}.tunerStage{display:grid;grid-template-columns:1.2fr .8fr;grid-template-rows:1fr;align-items:stretch}.tunerCard{min-height:0}.spectrumCard{height:auto}.fingerprintSection{padding-left:14px;padding-right:14px}.dataGrid{grid-template-columns:.55fr 1fr 1.1fr}.fingerPanel{min-height:520px}
}
@media (max-height:680px){.freq{font-size:clamp(64px,22vw,116px)}.meter{height:90px}.tunerCard{min-height:260px}.spectrumCard{height:116px}.scrollCue{display:none}}
</style>
</head>
<body>
<div id="app">
  <main class="hero" id="hero">
    <div class="topbar">
      <div class="brand">Advanced Tuner</div>
      <div class="spacer"></div>
      <div id="status" class="status">Tap to enable</div>
    </div>
    <section class="tunerStage">
      <div class="tunerCard" id="tunerCard">
        <div class="readout">
          <div class="smallLabel">Fundamental</div>
          <div class="freq"><span id="freqValue">--</span><span class="unit">Hz</span></div>
          <div class="note"><span id="noteValue">--</span><span id="centValue" class="cents">--¢</span></div>
          <div class="meter">
            <canvas id="meterCanvas" class="meterCanvas"></canvas>
            <div class="meterCenter"></div>
            <div class="meterLabels"><span>-50¢</span><span>0</span><span>+50¢</span></div>
          </div>
        </div>
        <div class="tunerMeta">
          <span id="clipWarn" class="clipWarn">Too loud · move phone away</span>
          <span class="sustainBadge" id="sustainBadge">Sustain -- s</span>
        </div>
        <div id="enableTap" class="enableTap">
          <button id="enableBtn" class="enableBtn">Tap to enable tuner</button>
          <div id="hint" class="enableNote">Browser will ask for microphone access</div>
        </div>
      </div>
      <div class="spectrumCard">
        <canvas id="liveSpectrumCanvas" class="spectrumCanvas"></canvas>
        <div class="spectrumTitle">Live spectrum</div>
        <div id="spectrumHint" class="spectrumHint">45 Hz–5 kHz</div>
      </div>
    </section>
    <div class="scrollCue">向下查看指紋 · 5–15 秒穩定段</div>
  </main>
  <section class="fingerprintSection" id="fingerprintSection">
    <div class="sectionHeader">
      <div>
        <div class="sectionTitle">頌缽指紋</div>
        <div class="dataLine muted" id="windowInfo">等待敲擊</div>
      </div>
      <div class="sectionActions">
        <button id="refreshFingerprintBtn" class="refreshBtn" type="button">下一顆</button>
        <div class="sectionSub">典型頻譜<br>穩定範圍</div>
      </div>
    </div>
    <div class="fingerPanel">
      <div class="graphWrap"><canvas id="graphCanvas" class="graphCanvas"></canvas></div>
      <div class="dataGrid">
        <div class="dataBox">
          <div class="dataTitle">明顯泛音</div>
          <div class="peakCountLine"><span id="peakCount" class="peakCount">--</span><span>個明顯主共鳴峰</span></div>
        </div>
        <div class="dataBox">
          <div class="dataTitle">泛音頻率 Hz</div>
          <div id="peaksHz" class="dataLine">--</div>
        </div>
        <div class="dataBox">
          <div class="dataTitle">倍率 / 倍頻位置</div>
          <div id="peaksRatio" class="dataLine">--</div>
        </div>
      </div>
    </div>
  </section>
</div>
<script>
(() => {
  'use strict';

  const meterCanvas = document.getElementById('meterCanvas');
  const meterCtx = meterCanvas.getContext('2d', { alpha: true });
  const liveSpectrumCanvas = document.getElementById('liveSpectrumCanvas');
  const liveSpectrumCtx = liveSpectrumCanvas.getContext('2d', { alpha: false });
  const graphCanvas = document.getElementById('graphCanvas');
  const graphCtx = graphCanvas.getContext('2d', { alpha: false });

  const statusEl = document.getElementById('status');
  const enableTap = document.getElementById('enableTap');
  const enableBtn = document.getElementById('enableBtn');
  const hintEl = document.getElementById('hint');
  const freqValue = document.getElementById('freqValue');
  const noteValue = document.getElementById('noteValue');
  const centValue = document.getElementById('centValue');
  const sustainBadge = document.getElementById('sustainBadge');
  const clipWarn = document.getElementById('clipWarn');
  const windowInfo = document.getElementById('windowInfo');
  const peakCountEl = document.getElementById('peakCount');
  const peaksHzEl = document.getElementById('peaksHz');
  const peaksRatioEl = document.getElementById('peaksRatio');
  const spectrumHint = document.getElementById('spectrumHint');
  const refreshFingerprintBtn = document.getElementById('refreshFingerprintBtn');

  const MIN_FREQ = 45;
  const MAX_FREQ = 5000;
  const F0_MIN = 45;
  const F0_MAX = 900;
  const FFT_SIZE = 16384;
  const HIT_REFRACTORY = 1.4;
  const FINGER_START = 5.0;
  const FINGER_END = 15.0;
  const MAX_LIST_PEAKS = 8;
  const MAX_ANALYZED_PEAKS = 16;
  const DB_MIN = -95;
  const DB_MAX = -10;

  let audioCtx = null;
  let analyser = null;
  let freqData = null;
  let timeData = null;
  let sampleRate = 44100;
  let binHz = 44100 / FFT_SIZE;

  let running = false;
  let sessionStart = 0;
  let lastHitTime = -999;
  let sessionPeakDb = -Infinity;
  let noiseFloorDb = -82;
  let rmsDb = -100;
  let prevRmsDb = -100;
  let liveF0 = null;
  let lockedF0 = null;
  let currentCents = 0;
  let meterCents = 0;
  let stableFrames = [];
  let lockFrames = [];
  let fingerprint = null;
  let sustainSeconds = null;
  let lastFingerprintAt = 0;
  let clippedUntil = 0;

  enableBtn.addEventListener('click', start);
  refreshFingerprintBtn.addEventListener('click', resetForNextBowl);
  window.addEventListener('resize', () => {
    drawMeter();
    drawLiveSpectrum();
    drawFingerprint();
  }, { passive: true });

  async function start() {
    hintEl.textContent = 'Requesting microphone…';
    if (!window.isSecureContext) {
      hintEl.textContent = 'iOS / Safari needs HTTPS for microphone access.';
      return;
    }
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      hintEl.textContent = 'This browser does not provide microphone access.';
      return;
    }
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)({ latencyHint: 'interactive' });
      const stream = await navigator.mediaDevices.getUserMedia({
        audio: {
          echoCancellation: false,
          noiseSuppression: false,
          autoGainControl: false,
          channelCount: 1
        }
      });
      if (audioCtx.state === 'suspended') await audioCtx.resume();
      const source = audioCtx.createMediaStreamSource(stream);
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = FFT_SIZE;
      analyser.smoothingTimeConstant = 0.54;
      analyser.minDecibels = -110;
      analyser.maxDecibels = -5;
      source.connect(analyser);
      sampleRate = audioCtx.sampleRate;
      binHz = sampleRate / analyser.fftSize;
      freqData = new Float32Array(analyser.frequencyBinCount);
      timeData = new Float32Array(analyser.fftSize);
      running = true;
      enableTap.classList.add('hidden');
      statusEl.textContent = 'Listening';
      requestAnimationFrame(tick);
    } catch (err) {
      hintEl.textContent = 'Microphone failed: ' + (err && err.message ? err.message : String(err));
    }
  }

  function tick() {
    if (!running) return;
    analyser.getFloatFrequencyData(freqData);
    analyser.getFloatTimeDomainData(timeData);
    const now = audioCtx.currentTime;
    prevRmsDb = rmsDb;
    rmsDb = computeRmsDb(timeData);

    if (detectClipping(timeData)) clippedUntil = now + 1.2;
    clipWarn.classList.toggle('show', now < clippedUntil);

    updateNoiseFloor(now);
    const f0Candidate = estimateF0FromSpectrum(freqData);
    if (f0Candidate) liveF0 = liveF0 ? liveF0 * 0.78 + f0Candidate * 0.22 : f0Candidate;

    if (shouldStartHit(now)) startNewHit(now);

    if (sessionStart > 0) {
      const t = now - sessionStart;
      sessionPeakDb = Math.max(sessionPeakDb, rmsDb);
      if (t >= 0.35 && t <= 2.2) lockFrames.push(copySpectrum(freqData));
      if (t >= FINGER_START && t <= FINGER_END && rmsDb > noiseFloorDb + 8) stableFrames.push({ rmsDb, spectrum: copySpectrum(freqData) });
      if (!lockedF0 && t > 1.1 && lockFrames.length >= 4) lockedF0 = estimateF0FromFrames(lockFrames) || liveF0;
      if (t >= FINGER_START && now - lastFingerprintAt > 0.55) {
        fingerprint = buildFingerprint(stableFrames, lockedF0 || liveF0);
        lastFingerprintAt = now;
      }
      updateSustain(t);
      updateWindowInfo(t);
    }

    updateTunerReadout();
    drawMeter();
    drawLiveSpectrum();
    drawFingerprint();
    requestAnimationFrame(tick);
  }

  function computeRmsDb(buffer) {
    let sum = 0;
    for (let i = 0; i < buffer.length; i++) sum += buffer[i] * buffer[i];
    const rms = Math.sqrt(sum / buffer.length) || 1e-12;
    return 20 * Math.log10(rms);
  }

  function detectClipping(buffer) {
    let count = 0;
    for (let i = 0; i < buffer.length; i++) if (Math.abs(buffer[i]) > 0.985) count++;
    return count > 16;
  }

  function updateNoiseFloor(now) {
    if (rmsDb < noiseFloorDb + 10 && now - lastHitTime > 2.5) noiseFloorDb = noiseFloorDb * 0.985 + rmsDb * 0.015;
  }

  function shouldStartHit(now) {
    if (now - lastHitTime < HIT_REFRACTORY) return false;
    const rising = rmsDb - prevRmsDb;
    return rmsDb > -43 && rmsDb > noiseFloorDb + 18 && rising > 7;
  }

  function startNewHit(now) {
    lastHitTime = now;
    sessionStart = now;
    sessionPeakDb = rmsDb;
    stableFrames = [];
    lockFrames = [];
    fingerprint = null;
    sustainSeconds = null;
    lockedF0 = null;
    lastFingerprintAt = 0;
    peakCountEl.textContent = '--';
    peaksHzEl.textContent = '--';
    peaksRatioEl.textContent = '--';
    windowInfo.textContent = '已偵測敲擊 · 收集 5–15 秒穩定段';
    statusEl.textContent = 'Hit detected';
  }

  function resetForNextBowl() {
    sessionStart = 0;
    sessionPeakDb = -Infinity;
    stableFrames = [];
    lockFrames = [];
    fingerprint = null;
    sustainSeconds = null;
    lockedF0 = null;
    lastFingerprintAt = 0;
    peakCountEl.textContent = '--';
    peaksHzEl.textContent = '--';
    peaksRatioEl.textContent = '--';
    windowInfo.textContent = '已準備好下一顆';
    sustainBadge.textContent = 'Sustain -- s';
    statusEl.textContent = running ? 'Listening' : 'Tap to enable';
    drawFingerprint();
  }

  function copySpectrum(src) { return new Float32Array(src); }

  function estimateF0FromSpectrum(spectrum) {
    const start = Math.max(1, Math.floor(F0_MIN / binHz));
    const end = Math.min(spectrum.length - 2, Math.ceil(F0_MAX / binHz));
    const candidates = [];
    const smooth = smoothArray(spectrum, 3);
    for (let i = start + 1; i < end - 1; i++) {
      const v = smooth[i];
      if (v > smooth[i - 1] && v >= smooth[i + 1] && v > -78) candidates.push({ freq: refinePeakFreq(smooth, i), db: v });
    }
    if (!candidates.length) return null;
    candidates.sort((a, b) => b.db - a.db);
    const topDb = candidates[0].db;
    const strong = candidates.filter(p => p.db > topDb - 14);
    strong.sort((a, b) => a.freq - b.freq);
    return strong[0].freq;
  }

  function estimateF0FromFrames(frames) {
    if (!frames.length) return null;
    return estimateF0FromSpectrum(averageSpectrum(frames));
  }

  function averageSpectrum(frames) {
    const n = frames[0].length;
    const out = new Float32Array(n);
    for (let i = 0; i < n; i++) {
      let power = 0;
      for (const frame of frames) power += Math.pow(10, frame[i] / 10);
      out[i] = 10 * Math.log10(power / frames.length + 1e-12);
    }
    return out;
  }

  function buildFingerprint(frames, baseFreq) {
    if (!frames || frames.length < 6) return null;
    const selected = trimFramesByLevel(frames);
    if (selected.length < 4) return null;

    const startBin = Math.max(1, Math.floor(MIN_FREQ / binHz));
    const endBin = Math.min(selected[0].spectrum.length - 2, Math.ceil(MAX_FREQ / binHz));
    const p20 = new Float32Array(endBin + 1);
    const p50 = new Float32Array(endBin + 1);
    const p90 = new Float32Array(endBin + 1);
    const vals = [];

    for (let i = startBin; i <= endBin; i++) {
      vals.length = 0;
      for (const fr of selected) vals.push(fr.spectrum[i]);
      vals.sort((a, b) => a - b);
      p20[i] = percentileSorted(vals, 0.20);
      p50[i] = percentileSorted(vals, 0.50);
      p90[i] = percentileSorted(vals, 0.90);
    }

    const smoothMedian = smoothArray(p50, 4);
    const peaks = findSignificantPeaks(smoothMedian, baseFreq);
    return { p20, p50: smoothMedian, p90, startBin, endBin, peaks, frameCount: selected.length };
  }

  function trimFramesByLevel(frames) {
    if (frames.length < 6) return frames;
    const levels = frames.map(f => f.rmsDb).slice().sort((a, b) => a - b);
    const lo = percentileSorted(levels, 0.18);
    const hi = percentileSorted(levels, 0.92);
    return frames.filter(f => f.rmsDb >= lo && f.rmsDb <= hi);
  }

  function percentileSorted(sorted, p) {
    if (!sorted.length) return -120;
    const idx = (sorted.length - 1) * p;
    const lo = Math.floor(idx), hi = Math.ceil(idx);
    if (lo === hi) return sorted[lo];
    const t = idx - lo;
    return sorted[lo] * (1 - t) + sorted[hi] * t;
  }

  function smoothArray(arr, radius) {
    const out = new Float32Array(arr.length);
    for (let i = 0; i < arr.length; i++) {
      let sum = 0, count = 0;
      for (let k = -radius; k <= radius; k++) {
        const j = i + k;
        if (j >= 0 && j < arr.length && Number.isFinite(arr[j])) { sum += arr[j]; count++; }
      }
      out[i] = count ? sum / count : arr[i];
    }
    return out;
  }

  function findSignificantPeaks(spectrum, baseFreq) {
    const start = Math.max(1, Math.floor(MIN_FREQ / binHz));
    const end = Math.min(spectrum.length - 2, Math.ceil(MAX_FREQ / binHz));
    let maxDb = -Infinity;
    for (let i = start; i <= end; i++) maxDb = Math.max(maxDb, spectrum[i]);
    const threshold = Math.max(maxDb - 36, -82);
    const candidates = [];
    for (let i = start + 2; i < end - 2; i++) {
      const v = spectrum[i];
      if (v < threshold) continue;
      if (v >= spectrum[i - 1] && v >= spectrum[i + 1] && v > spectrum[i - 2] && v > spectrum[i + 2]) {
        const leftBase = Math.min(spectrum[Math.max(start, i - 18)], spectrum[Math.max(start, i - 9)]);
        const rightBase = Math.min(spectrum[Math.min(end, i + 18)], spectrum[Math.min(end, i + 9)]);
        const prom = v - Math.max(leftBase, rightBase);
        if (prom >= 4.5) candidates.push({ freq: refinePeakFreq(spectrum, i), db: v, prominence: prom });
      }
    }
    candidates.sort((a, b) => b.db - a.db);
    const merged = [];
    for (const p of candidates) {
      const close = merged.some(q => Math.abs(Math.log2(p.freq / q.freq)) < 0.035 || Math.abs(p.freq - q.freq) < 18);
      if (!close) merged.push(p);
      if (merged.length >= MAX_ANALYZED_PEAKS) break;
    }
    merged.sort((a, b) => a.freq - b.freq);
    const f0 = baseFreq || (merged.length ? merged[0].freq : null);
    for (const p of merged) {
      p.ratio = f0 ? p.freq / f0 : null;
      p.octavePosition = p.ratio ? frac(Math.log2(p.ratio)) : null;
    }
    return merged;
  }

  function refinePeakFreq(spectrum, i) {
    const y0 = spectrum[i - 1], y1 = spectrum[i], y2 = spectrum[i + 1];
    const denom = y0 - 2 * y1 + y2;
    const delta = Math.abs(denom) > 1e-6 ? 0.5 * (y0 - y2) / denom : 0;
    return (i + clamp(delta, -0.5, 0.5)) * binHz;
  }

  function frac(x) { return x - Math.floor(x); }

  function updateSustain(t) {
    if (sessionPeakDb === -Infinity) return;
    const threshold = Math.max(noiseFloorDb + 8, sessionPeakDb - 45);
    if (!sustainSeconds && t > 1 && rmsDb < threshold) sustainSeconds = t;
    const s = sustainSeconds || t;
    sustainBadge.textContent = 'Sustain ' + s.toFixed(1) + ' s';
  }

  function updateWindowInfo(t) {
    if (t < FINGER_START) {
      statusEl.textContent = 'Listening';
      windowInfo.textContent = '收集中 · 5 秒後開始建立指紋';
    } else if (t <= FINGER_END) {
      statusEl.textContent = 'Analyzing';
      windowInfo.textContent = '分析中 ' + t.toFixed(1) + ' 秒 · 5–15 秒穩定段';
    } else {
      statusEl.textContent = fingerprint ? 'Fingerprint ready' : 'Ready';
      windowInfo.textContent = fingerprint ? '指紋完成 · 最近一次敲擊' : '等待可用尾音';
    }
  }

  function updateTunerReadout() {
    const displayF = lockedF0 || liveF0;
    if (!displayF || !Number.isFinite(displayF)) {
      freqValue.textContent = '--';
      noteValue.textContent = '--';
      centValue.textContent = '--¢';
      currentCents = 0;
      return;
    }
    const note = freqToNote(displayF);
    currentCents = note.cents;
    meterCents = meterCents * 0.82 + currentCents * 0.18;
    freqValue.textContent = displayF < 100 ? displayF.toFixed(1) : Math.round(displayF).toString();
    noteValue.textContent = note.name;
    centValue.textContent = (note.cents >= 0 ? '+' : '') + note.cents.toFixed(0) + '¢';
    spectrumHint.textContent = 'F0 ' + formatHz(displayF) + ' Hz';
  }

  function freqToNote(freq) {
    const names = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
    const midiFloat = 69 + 12 * Math.log2(freq / 440);
    const midi = Math.round(midiFloat);
    const cents = (midiFloat - midi) * 100;
    const octave = Math.floor(midi / 12) - 1;
    return { name: names[((midi % 12) + 12) % 12] + octave, cents, midi };
  }

  function drawMeter() {
    const { w, h } = resizeCanvas(meterCanvas, meterCtx);
    meterCtx.clearRect(0, 0, w, h);
    const cx = w / 2;
    const y = h * 0.44;
    const length = w * 0.84;
    const x0 = cx - length / 2;
    const x1 = cx + length / 2;

    meterCtx.save();
    meterCtx.strokeStyle = 'rgba(148,163,184,.28)';
    meterCtx.lineWidth = 1;
    meterCtx.beginPath(); meterCtx.moveTo(x0, y); meterCtx.lineTo(x1, y); meterCtx.stroke();

    for (let c = -50; c <= 50; c += 10) {
      const x = x0 + (c + 50) / 100 * length;
      const major = c % 50 === 0 || c === 0;
      meterCtx.strokeStyle = c === 0 ? 'rgba(255,255,255,.55)' : 'rgba(148,163,184,.28)';
      meterCtx.lineWidth = c === 0 ? 2 : 1;
      meterCtx.beginPath(); meterCtx.moveTo(x, y - (major ? 28 : 15)); meterCtx.lineTo(x, y + (major ? 28 : 15)); meterCtx.stroke();
    }

    const clamped = clamp(meterCents || 0, -50, 50);
    const px = x0 + (clamped + 50) / 100 * length;
    const grad = meterCtx.createLinearGradient(px, y - 50, px, y + 52);
    grad.addColorStop(0, '#a7f3d0');
    grad.addColorStop(1, '#34d399');
    meterCtx.strokeStyle = grad;
    meterCtx.lineWidth = 5;
    meterCtx.lineCap = 'round';
    meterCtx.shadowColor = 'rgba(52,211,153,.38)';
    meterCtx.shadowBlur = 18;
    meterCtx.beginPath(); meterCtx.moveTo(px, y - 52); meterCtx.lineTo(px, y + 52); meterCtx.stroke();
    meterCtx.shadowBlur = 0;
    meterCtx.fillStyle = Math.abs(clamped) < 5 ? '#34d399' : Math.abs(clamped) < 22 ? '#facc15' : '#fb7185';
    meterCtx.beginPath(); meterCtx.arc(px, y, 6, 0, Math.PI * 2); meterCtx.fill();
    meterCtx.restore();
  }

  function drawLiveSpectrum() {
    const { w, h } = resizeCanvas(liveSpectrumCanvas, liveSpectrumCtx);
    liveSpectrumCtx.fillStyle = '#030712';
    liveSpectrumCtx.fillRect(0, 0, w, h);
    const m = { l: 36, r: 12, t: 26, b: 24 };
    const gw = Math.max(10, w - m.l - m.r);
    const gh = Math.max(10, h - m.t - m.b);
    drawGrid(liveSpectrumCtx, w, h, m, gw, gh, true);
    if (!freqData) {
      liveSpectrumCtx.fillStyle = 'rgba(148,163,184,.62)';
      liveSpectrumCtx.font = '11px -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif';
      liveSpectrumCtx.fillText('Tap to enable live spectrum', m.l + 8, m.t + 20);
      return;
    }
    drawSpectrumLine(liveSpectrumCtx, freqData, m, gw, gh, '#34d399', 1.7, 240);
  }

  function drawFingerprint() {
    const { w, h } = resizeCanvas(graphCanvas, graphCtx);
    graphCtx.fillStyle = '#030712';
    graphCtx.fillRect(0, 0, w, h);
    const m = { l: 44, r: 16, t: 14, b: 30 };
    const gw = Math.max(10, w - m.l - m.r);
    const gh = Math.max(10, h - m.t - m.b);
    drawGrid(graphCtx, w, h, m, gw, gh, false);
    if (!fingerprint) {
      graphCtx.fillStyle = 'rgba(148,163,184,.72)';
      graphCtx.font = '12px -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif';
      graphCtx.fillText('等待 5–15 秒穩定共鳴段', m.l + 8, m.t + 22);
      return;
    }

    const { p20, p50, p90, startBin, endBin, peaks } = fingerprint;
    const points = makeLogPoints(startBin, endBin, 260);
    const xForFreq = f => m.l + (Math.log(f / MIN_FREQ) / Math.log(MAX_FREQ / MIN_FREQ)) * gw;
    const yForDb = db => m.t + (1 - (clamp(db, DB_MIN, DB_MAX) - DB_MIN) / (DB_MAX - DB_MIN)) * gh;

    graphCtx.save();
    graphCtx.beginPath();
    points.forEach((bin, idx) => {
      const x = xForFreq(bin * binHz);
      const y = yForDb(p90[bin]);
      if (idx === 0) graphCtx.moveTo(x, y); else graphCtx.lineTo(x, y);
    });
    for (let i = points.length - 1; i >= 0; i--) graphCtx.lineTo(xForFreq(points[i] * binHz), yForDb(p20[points[i]]));
    graphCtx.closePath();
    graphCtx.fillStyle = 'rgba(45,212,191,.18)';
    graphCtx.fill();

    graphCtx.beginPath();
    points.forEach((bin, idx) => {
      const x = xForFreq(bin * binHz);
      const y = yForDb(p50[bin]);
      if (idx === 0) graphCtx.moveTo(x, y); else graphCtx.lineTo(x, y);
    });
    graphCtx.strokeStyle = '#34d399';
    graphCtx.lineWidth = 2.2;
    graphCtx.shadowColor = 'rgba(52,211,153,.22)';
    graphCtx.shadowBlur = 10;
    graphCtx.stroke();
    graphCtx.shadowBlur = 0;

    const showPeaks = peaks.slice(0, MAX_LIST_PEAKS);
    graphCtx.font = '10px -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif';
    graphCtx.textAlign = 'center';
    graphCtx.textBaseline = 'bottom';
    for (const p of showPeaks) {
      const x = xForFreq(p.freq);
      const y = yForDb(p.db);
      graphCtx.strokeStyle = 'rgba(125,211,252,.48)';
      graphCtx.lineWidth = 1;
      graphCtx.beginPath(); graphCtx.moveTo(x, m.t); graphCtx.lineTo(x, m.t + gh); graphCtx.stroke();
      graphCtx.fillStyle = '#bfdbfe';
      graphCtx.fillText(formatHz(p.freq), x, Math.max(m.t + 12, y - 4));
    }
    graphCtx.restore();
    updatePeakText(peaks);
  }

  function drawSpectrumLine(ctx, spectrum, m, gw, gh, color, width, count) {
    const startBin = Math.max(1, Math.floor(MIN_FREQ / binHz));
    const endBin = Math.min(spectrum.length - 2, Math.ceil(MAX_FREQ / binHz));
    const points = makeLogPoints(startBin, endBin, count);
    const xForFreq = f => m.l + (Math.log(f / MIN_FREQ) / Math.log(MAX_FREQ / MIN_FREQ)) * gw;
    const yForDb = db => m.t + (1 - (clamp(db, DB_MIN, DB_MAX) - DB_MIN) / (DB_MAX - DB_MIN)) * gh;
    ctx.save();
    ctx.beginPath();
    points.forEach((bin, idx) => {
      const x = xForFreq(bin * binHz);
      const y = yForDb(spectrum[bin]);
      if (idx === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    });
    ctx.strokeStyle = color;
    ctx.lineWidth = width;
    ctx.shadowColor = 'rgba(52,211,153,.18)';
    ctx.shadowBlur = 8;
    ctx.stroke();
    ctx.restore();
  }

  function drawGrid(ctx, w, h, m, gw, gh, compact) {
    ctx.save();
    ctx.strokeStyle = 'rgba(148,163,184,.14)';
    ctx.lineWidth = 1;
    const freqTicks = [50, 100, 200, 500, 1000, 2000, 5000];
    ctx.font = (compact ? '9px' : '10px') + ' -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif';
    ctx.fillStyle = 'rgba(148,163,184,.62)';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    for (const f of freqTicks) {
      if (f < MIN_FREQ || f > MAX_FREQ) continue;
      const x = m.l + (Math.log(f / MIN_FREQ) / Math.log(MAX_FREQ / MIN_FREQ)) * gw;
      ctx.beginPath(); ctx.moveTo(x, m.t); ctx.lineTo(x, m.t + gh); ctx.stroke();
      ctx.fillText(f >= 1000 ? (f / 1000) + 'k' : String(f), x, m.t + gh + 6);
    }
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';
    const dbTicks = compact ? [-40, -70] : [-20, -40, -60, -80];
    for (const db of dbTicks) {
      const y = m.t + (1 - (db - DB_MIN) / (DB_MAX - DB_MIN)) * gh;
      ctx.beginPath(); ctx.moveTo(m.l, y); ctx.lineTo(m.l + gw, y); ctx.stroke();
      ctx.fillText(db + 'dB', m.l - 6, y);
    }
    ctx.restore();
  }

  function makeLogPoints(startBin, endBin, count) {
    const bins = [];
    const f0 = Math.max(MIN_FREQ, startBin * binHz);
    const f1 = Math.min(MAX_FREQ, endBin * binHz);
    let last = -1;
    for (let i = 0; i < count; i++) {
      const t = i / (count - 1);
      const f = f0 * Math.pow(f1 / f0, t);
      const bin = Math.max(startBin, Math.min(endBin, Math.round(f / binHz)));
      if (bin !== last) bins.push(bin);
      last = bin;
    }
    return bins;
  }

  function updatePeakText(peaks) {
    const list = peaks || [];
    peakCountEl.textContent = String(list.length);
    const shown = list.slice(0, MAX_LIST_PEAKS);
    if (!shown.length) {
      peaksHzEl.textContent = '--';
      peaksRatioEl.textContent = '--';
      return;
    }
    peaksHzEl.textContent = shown.map(p => formatHz(p.freq)).join(' / ');
    peaksRatioEl.textContent = shown.map(p => {
      const r = p.ratio ? '×' + p.ratio.toFixed(2) : '×--';
      const 位置 = Number.isFinite(p.octavePosition) ? p.octavePosition.toFixed(2) : '--';
      return r + ' · 位置 ' + pos;
    }).join(' / ');
  }

  function resizeCanvas(canvas, ctx) {
    const dpr = Math.max(1, Math.min(3, window.devicePixelRatio || 1));
    const rect = canvas.getBoundingClientRect();
    const w = Math.max(10, Math.floor(rect.width));
    const h = Math.max(10, Math.floor(rect.height));
    if (canvas.width !== Math.floor(w * dpr) || canvas.height !== Math.floor(h * dpr)) {
      canvas.width = Math.floor(w * dpr);
      canvas.height = Math.floor(h * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    return { w, h };
  }

  function formatHz(freq) {
    if (!Number.isFinite(freq)) return '--';
    return freq < 100 ? freq.toFixed(1) : String(Math.round(freq));
  }

  function clamp(x, a, b) { return Math.max(a, Math.min(b, x)); }

  drawMeter();
  drawLiveSpectrum();
  drawFingerprint();
})();
</script>
