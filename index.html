<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>頌缽共鳴線</title>
<style>
  :root {
    --bg: #08090b;
    --panel: rgba(18, 20, 24, .86);
    --text: #f4f4f5;
    --muted: #9ca3af;
    --line: rgba(255,255,255,.16);
    --line2: rgba(255,255,255,.08);
    --accent: #f59e0b;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  #app { position: fixed; inset: 0; display: flex; flex-direction: column; padding: env(safe-area-inset-top) 10px env(safe-area-inset-bottom); }
  header { height: 54px; display: flex; align-items: center; gap: 10px; z-index: 2; }
  .title { font-size: 16px; font-weight: 650; letter-spacing: .02em; white-space: nowrap; }
  .spacer { flex: 1; }
  .seg { display: inline-flex; border: 1px solid rgba(255,255,255,.18); border-radius: 999px; overflow: hidden; background: rgba(255,255,255,.05); }
  .seg button { appearance: none; border: 0; padding: 8px 12px; background: transparent; color: var(--muted); font-weight: 650; font-size: 14px; }
  .seg button.active { background: rgba(255,255,255,.18); color: #fff; }
  #status { font-size: 12px; color: var(--muted); text-align: right; min-width: 128px; }
  #stage { position: relative; flex: 1; min-height: 0; border-radius: 18px; overflow: hidden; background: radial-gradient(circle at top left, #151923 0%, #08090b 55%); border: 1px solid rgba(255,255,255,.10); }
  canvas { width: 100%; height: 100%; display: block; }
  #startLayer { position: absolute; inset: 0; z-index: 5; display: flex; align-items: center; justify-content: center; padding: 24px; background: linear-gradient(180deg, rgba(8,9,11,.94), rgba(8,9,11,.76)); }
  .card { width: min(520px, 92vw); border-radius: 24px; padding: 22px; background: var(--panel); border: 1px solid rgba(255,255,255,.12); box-shadow: 0 20px 80px rgba(0,0,0,.45); }
  .card h1 { margin: 0 0 10px; font-size: 22px; line-height: 1.2; }
  .card p { margin: 0 0 16px; color: var(--muted); line-height: 1.55; font-size: 14px; }
  #startBtn { width: 100%; border: 0; border-radius: 18px; padding: 15px 18px; background: #f4f4f5; color: #111; font-size: 17px; font-weight: 750; }
  #hint { margin-top: 12px; min-height: 20px; color: #fca5a5; font-size: 13px; line-height: 1.45; }
  .badge { color: var(--accent); }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="title">頌缽共鳴線</div>
    <div class="seg" aria-label="選擇線數">
      <button data-lines="4">4</button>
      <button data-lines="8" class="active">8</button>
      <button data-lines="12">12</button>
    </div>
    <div class="spacer"></div>
    <div id="status">等待啟動</div>
  </header>
  <main id="stage">
    <canvas id="canvas"></canvas>
    <div id="startLayer">
      <div class="card">
        <h1>即時聲音 → 共鳴線</h1>
        <p>每次敲擊變大聲時，自動清圖、重新抓主頻，畫出 0–30 秒的衰減線。<br>不錄音、不存檔、不判斷好壞。</p>
        <button id="startBtn">啟動麥克風</button>
        <div id="hint"></div>
      </div>
    </div>
  </main>
</div>

<script>
(() => {
  'use strict';

  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d', { alpha: false });
  const stage = document.getElementById('stage');
  const statusEl = document.getElementById('status');
  const startLayer = document.getElementById('startLayer');
  const startBtn = document.getElementById('startBtn');
  const hintEl = document.getElementById('hint');
  const lineButtons = Array.from(document.querySelectorAll('[data-lines]'));

  const VIEW_SECONDS = 30;
  const DB_MIN = -60;
  const DB_MAX = 0;
  const MIN_FREQ = 70;
  const MAX_FREQ = 10000;
  const F0_MAX = 2500;
  const F0_CAPTURE_DELAY = 0.22; // seconds after hit; avoids attack noise
  const HIT_REFRACTORY = 0.65;   // seconds

  let lineCount = 8;
  let audioCtx = null;
  let analyser = null;
  let freqData = null;
  let timeData = null;
  let sampleRate = 44100;
  let fftSize = 8192;

  let running = false;
  let sessionStart = 0;
  let lastHit = -999;
  let activeSession = false;
  let f0 = null;
  let sessionPeakDb = -Infinity;
  let rmsHistory = [];
  let noiseFloorDb = -78;
  let tracks = [];
  let nextTrackId = 1;

  let width = 0, height = 0, dpr = 1;
  const margin = { left: 46, right: 12, top: 18, bottom: 34 };

  function resize() {
    dpr = Math.max(1, Math.min(3, window.devicePixelRatio || 1));
    const rect = stage.getBoundingClientRect();
    width = Math.max(320, Math.floor(rect.width));
    height = Math.max(320, Math.floor(rect.height));
    canvas.width = Math.floor(width * dpr);
    canvas.height = Math.floor(height * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    draw();
  }

  window.addEventListener('resize', resize, { passive: true });
  window.addEventListener('orientationchange', () => setTimeout(resize, 250), { passive: true });
  resize();

  lineButtons.forEach(btn => {
    btn.addEventListener('click', () => {
      lineCount = Number(btn.dataset.lines);
      lineButtons.forEach(b => b.classList.toggle('active', b === btn));
      draw();
    });
  });

  startBtn.addEventListener('click', start);

  async function start() {
    hintEl.textContent = '';

    if (!window.isSecureContext) {
      hintEl.textContent = 'iPhone 上通常需要用 HTTPS 網址開啟，不能用普通 http。';
      return;
    }

    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      hintEl.textContent = '這個瀏覽器拿不到麥克風。請用 iPhone Safari 開啟。';
      return;
    }

    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)({ latencyHint: 'interactive' });
      await audioCtx.resume();

      let stream;
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          audio: {
            echoCancellation: false,
            noiseSuppression: false,
            autoGainControl: false
          },
          video: false
        });
      } catch (e) {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
      }

      const source = audioCtx.createMediaStreamSource(stream);
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = fftSize;
      analyser.smoothingTimeConstant = 0.08;
      analyser.minDecibels = -105;
      analyser.maxDecibels = -10;
      source.connect(analyser);

      sampleRate = audioCtx.sampleRate || 44100;
      freqData = new Float32Array(analyser.frequencyBinCount);
      timeData = new Float32Array(analyser.fftSize);

      running = true;
      activeSession = false;
      startLayer.style.display = 'none';
      statusEl.textContent = '等待敲擊';
      requestAnimationFrame(tick);
    } catch (err) {
      hintEl.textContent = '麥克風啟動失敗：' + (err && err.message ? err.message : err);
    }
  }

  function nowSec() {
    return audioCtx ? audioCtx.currentTime : performance.now() / 1000;
  }

  function tick() {
    if (!running || !analyser) return;

    const now = nowSec();
    analyser.getFloatTimeDomainData(timeData);
    analyser.getFloatFrequencyData(freqData);

    const rmsDb = getRmsDb(timeData);
    updateNoiseFloor(rmsDb);
    updateRmsHistory(now, rmsDb);

    if (detectHit(now, rmsDb)) {
      newSession(now);
    }

    if (activeSession) {
      const elapsed = now - sessionStart;
      const peaks = findPeaks();

      const strongest = peaks.length ? peaks[0].db : -Infinity;
      if (strongest > sessionPeakDb) sessionPeakDb = strongest;

      if (!f0 && elapsed >= F0_CAPTURE_DELAY) {
        f0 = estimateF0(peaks);
      }

      if (f0 && elapsed <= VIEW_SECONDS) {
        updateTracks(peaks, elapsed);
      }

      draw();
      statusEl.innerHTML = f0
        ? `f0 ${Math.round(f0)} Hz · ${Math.min(elapsed, VIEW_SECONDS).toFixed(1)}s`
        : `抓主頻中 · ${elapsed.toFixed(1)}s`;
    } else {
      drawIdle(rmsDb);
    }

    requestAnimationFrame(tick);
  }

  function getRmsDb(buf) {
    let sum = 0;
    for (let i = 0; i < buf.length; i++) sum += buf[i] * buf[i];
    const rms = Math.sqrt(sum / buf.length) || 1e-12;
    return 20 * Math.log10(rms);
  }

  function updateNoiseFloor(rmsDb) {
    if (!activeSession || rmsDb < noiseFloorDb + 8) {
      noiseFloorDb = noiseFloorDb * 0.985 + rmsDb * 0.015;
    }
  }

  function updateRmsHistory(now, db) {
    rmsHistory.push({ t: now, db });
    while (rmsHistory.length && now - rmsHistory[0].t > 1.1) rmsHistory.shift();
  }

  function recentMinRms() {
    let m = Infinity;
    for (const p of rmsHistory) if (p.db < m) m = p.db;
    return Number.isFinite(m) ? m : noiseFloorDb;
  }

  function detectHit(now, rmsDb) {
    if (now - lastHit < HIT_REFRACTORY) return false;
    const jump = rmsDb - recentMinRms();
    const aboveNoise = rmsDb - noiseFloorDb;
    return aboveNoise > 15 && jump > 9 && rmsDb > -58;
  }

  function newSession(now) {
    activeSession = true;
    sessionStart = now;
    lastHit = now;
    f0 = null;
    sessionPeakDb = -Infinity;
    tracks = [];
    nextTrackId = 1;
  }

  function findPeaks() {
    const binHz = sampleRate / analyser.fftSize;
    const startBin = Math.max(2, Math.ceil(MIN_FREQ / binHz));
    const endBin = Math.min(freqData.length - 2, Math.floor(Math.min(MAX_FREQ, sampleRate / 2 - 200) / binHz));
    const peaks = [];

    let localMax = -Infinity;
    for (let i = startBin; i <= endBin; i++) if (freqData[i] > localMax) localMax = freqData[i];
    const threshold = Math.max(-92, localMax - 54);

    for (let i = startBin; i <= endBin; i++) {
      const a = freqData[i - 1], b = freqData[i], c = freqData[i + 1];
      if (b > threshold && b > a && b >= c) {
        const denom = a - 2 * b + c;
        let delta = 0;
        if (Math.abs(denom) > 1e-6) delta = clamp(0.5 * (a - c) / denom, -0.75, 0.75);
        const freq = (i + delta) * binHz;
        const db = b - 0.25 * (a - c) * delta;
        peaks.push({ freq, db });
      }
    }

    peaks.sort((p, q) => q.db - p.db);
    return mergeClosePeaks(peaks).slice(0, 80);
  }

  function mergeClosePeaks(peaks) {
    const out = [];
    for (const p of peaks) {
      let tooClose = false;
      for (const q of out) {
        const oct = Math.abs(Math.log2(p.freq / q.freq));
        if (oct < 0.018) { tooClose = true; break; }
      }
      if (!tooClose) out.push(p);
    }
    return out;
  }

  function estimateF0(peaks) {
    if (!peaks.length) return null;
    const maxDb = peaks[0].db;
    const candidates = peaks
      .filter(p => p.freq >= MIN_FREQ && p.freq <= F0_MAX && p.db >= maxDb - 22)
      .sort((a, b) => a.freq - b.freq);

    const strong = candidates.filter(p => p.db >= maxDb - 13);
    if (strong.length) return strong[0].freq;

    const loudLow = candidates.sort((a, b) => b.db - a.db)[0];
    return loudLow ? loudLow.freq : null;
  }

  function updateTracks(peaks, elapsed) {
    if (!peaks.length || !Number.isFinite(sessionPeakDb)) return;

    const valid = peaks
      .filter(p => p.db >= sessionPeakDb + DB_MIN && p.freq >= MIN_FREQ && p.freq <= MAX_FREQ)
      .slice(0, 50);

    const used = new Set();
    for (const tr of tracks) {
      let bestIndex = -1;
      let bestDist = Infinity;
      for (let i = 0; i < valid.length; i++) {
        if (used.has(i)) continue;
        const p = valid[i];
        const dist = Math.abs(Math.log2(p.freq / tr.freq));
        if (dist < bestDist && dist < 0.055) {
          bestDist = dist;
          bestIndex = i;
        }
      }
      if (bestIndex >= 0) {
        const p = valid[bestIndex];
        used.add(bestIndex);
        addPoint(tr, p, elapsed);
        tr.freq = tr.freq * 0.75 + p.freq * 0.25;
        tr.lastSeen = elapsed;
        tr.missing = 0;
        tr.maxRelDb = Math.max(tr.maxRelDb, p.db - sessionPeakDb);
      } else {
        tr.missing = (tr.missing || 0) + 1;
      }
    }

    for (let i = 0; i < valid.length; i++) {
      if (used.has(i)) continue;
      const p = valid[i];
      if (p.db < sessionPeakDb - 48) continue;
      if (tracks.length >= 24) break;
      const tr = {
        id: nextTrackId++,
        freq: p.freq,
        points: [],
        firstSeen: elapsed,
        lastSeen: elapsed,
        missing: 0,
        maxRelDb: p.db - sessionPeakDb
      };
      addPoint(tr, p, elapsed);
      tracks.push(tr);
    }

    tracks = tracks.filter(tr => tr.missing < 18 && tr.points.length > 0);
  }

  function addPoint(track, peak, elapsed) {
    const relDb = clamp(peak.db - sessionPeakDb, DB_MIN, 0);
    track.points.push({ t: elapsed, db: relDb, freq: peak.freq });
    if (track.points.length > 1000) track.points.shift();
  }

  function visibleTracks() {
    return tracks
      .filter(tr => tr.points.length >= 3)
      .map(tr => {
        const duration = tr.lastSeen - tr.firstSeen;
        const recent = tr.points[tr.points.length - 1]?.db ?? DB_MIN;
        const score = tr.maxRelDb + duration * 1.6 + recent * 0.08;
        return { tr, score };
      })
      .sort((a, b) => b.score - a.score)
      .slice(0, lineCount)
      .map(x => x.tr);
  }

  function drawIdle(rmsDb) {
    drawBase();
    drawTextCenter('等待敲擊', `背景 ${Math.round(rmsDb)} dBFS`);
  }

  function draw() {
    drawBase();
    if (!activeSession) return;

    const now = nowSec();
    const elapsed = Math.min(now - sessionStart, VIEW_SECONDS);
    drawCursor(elapsed);

    const list = visibleTracks();
    for (const tr of list) drawTrack(tr);

    if (!f0) drawTextCenter('抓主頻中', '敲擊前 0.2 秒會先避開雜訊');
    else if (now - sessionStart > VIEW_SECONDS) drawTextCenter('30 秒結束', '下一次敲擊會自動重畫');
  }

  function drawBase() {
    ctx.fillStyle = '#08090b';
    ctx.fillRect(0, 0, width, height);

    const left = margin.left, right = width - margin.right;
    const top = margin.top, bottom = height - margin.bottom;
    const plotW = right - left, plotH = bottom - top;

    const g = ctx.createLinearGradient(0, top, 0, bottom);
    g.addColorStop(0, '#111827');
    g.addColorStop(1, '#050507');
    ctx.fillStyle = g;
    roundRect(ctx, left, top, plotW, plotH, 14);
    ctx.fill();

    ctx.font = '11px -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif';
    ctx.textBaseline = 'middle';

    // y grid: 0, -20, -40, -60
    for (const db of [0, -20, -40, -60]) {
      const y = yForDb(db);
      ctx.strokeStyle = db === 0 ? 'rgba(255,255,255,.18)' : 'rgba(255,255,255,.10)';
      ctx.lineWidth = 1;
      line(left, y, right, y);
      ctx.fillStyle = 'rgba(255,255,255,.62)';
      ctx.textAlign = 'right';
      ctx.fillText(db + ' dB', left - 8, y);
    }

    // x grid: every 5 sec
    for (let s = 0; s <= VIEW_SECONDS; s += 5) {
      const x = xForTime(s);
      ctx.strokeStyle = s === 0 ? 'rgba(255,255,255,.18)' : 'rgba(255,255,255,.075)';
      ctx.lineWidth = 1;
      line(x, top, x, bottom);
      ctx.fillStyle = 'rgba(255,255,255,.56)';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.fillText(String(s), x, bottom + 10);
    }

    ctx.fillStyle = 'rgba(255,255,255,.38)';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'top';
    ctx.fillText('秒', right, bottom + 10);
  }

  function drawTrack(tr) {
    const pts = tr.points.filter(p => p.t >= 0 && p.t <= VIEW_SECONDS && p.db >= DB_MIN);
    if (pts.length < 2) return;

    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.globalCompositeOperation = 'lighter';

    for (let i = 1; i < pts.length; i++) {
      const a = pts[i - 1], b = pts[i];
      if (Math.abs(b.t - a.t) > 0.35) continue;
      const avgFreq = (a.freq + b.freq) * 0.5;
      const alpha = clamp((Math.max(a.db, b.db) - DB_MIN) / 44, 0.12, 0.95);
      ctx.strokeStyle = colorForFreq(avgFreq, alpha);
      ctx.lineWidth = tr.freq === f0 ? 3.1 : 2.2;
      line(xForTime(a.t), yForDb(a.db), xForTime(b.t), yForDb(b.db));
    }

    ctx.globalCompositeOperation = 'source-over';
  }

  function drawCursor(t) {
    const x = xForTime(t);
    ctx.strokeStyle = 'rgba(255,255,255,.22)';
    ctx.setLineDash([4, 5]);
    line(x, margin.top, x, height - margin.bottom);
    ctx.setLineDash([]);
  }

  function drawTextCenter(main, sub) {
    const x = (margin.left + width - margin.right) / 2;
    const y = (margin.top + height - margin.bottom) / 2;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = 'rgba(255,255,255,.86)';
    ctx.font = '700 20px -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif';
    ctx.fillText(main, x, y - 12);
    ctx.fillStyle = 'rgba(255,255,255,.46)';
    ctx.font = '13px -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif';
    ctx.fillText(sub, x, y + 18);
  }

  function xForTime(t) {
    const left = margin.left, right = width - margin.right;
    return left + clamp(t / VIEW_SECONDS, 0, 1) * (right - left);
  }

  function yForDb(db) {
    const top = margin.top, bottom = height - margin.bottom;
    const v = (clamp(db, DB_MIN, DB_MAX) - DB_MIN) / (DB_MAX - DB_MIN);
    return bottom - v * (bottom - top);
  }

  function colorForFreq(freq, alpha = 1) {
    if (!f0 || !Number.isFinite(freq)) return `rgba(255,255,255,${alpha})`;
    const r = Math.log2(freq / f0);
    const pos = ((r % 1) + 1) % 1;
    const hue = pos * 360;
    return `hsla(${hue.toFixed(1)}, 95%, 62%, ${alpha})`;
  }

  function line(x1, y1, x2, y2) {
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function clamp(v, lo, hi) {
    return Math.max(lo, Math.min(hi, v));
  }
})();
</script>
</body>
</html>
