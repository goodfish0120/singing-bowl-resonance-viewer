<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>頌缽共鳴線</title>
<style>
  :root {
    --bg: #08090b;
    --panel: rgba(18, 20, 24, .86);
    --text: #f4f4f5;
    --muted: #9ca3af;
    --accent: #f59e0b;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  #app {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    padding: env(safe-area-inset-top) 10px env(safe-area-inset-bottom);
  }
  header {
    height: 54px;
    display: flex;
    align-items: center;
    gap: 10px;
    z-index: 2;
  }
  .title {
    font-size: 16px;
    font-weight: 650;
    letter-spacing: .02em;
    white-space: nowrap;
  }
  .spacer { flex: 1; }
  .seg {
    display: inline-flex;
    border: 1px solid rgba(255,255,255,.18);
    border-radius: 999px;
    overflow: hidden;
    background: rgba(255,255,255,.05);
  }
  .seg button {
    appearance: none;
    border: 0;
    padding: 8px 12px;
    background: transparent;
    color: var(--muted);
    font-weight: 650;
    font-size: 14px;
  }
  .seg button.active { background: rgba(255,255,255,.18); color: #fff; }
  #status {
    font-size: 12px;
    color: var(--muted);
    text-align: right;
    min-width: 92px;
    white-space: nowrap;
  }
  #stage {
    position: relative;
    flex: 1;
    min-height: 0;
    border-radius: 18px;
    overflow: hidden;
    background: radial-gradient(circle at top left, #151923 0%, #08090b 55%);
    border: 1px solid rgba(255,255,255,.10);
  }
  canvas { width: 100%; height: 100%; display: block; }
  #startLayer {
    position: absolute;
    inset: 0;
    z-index: 5;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: linear-gradient(180deg, rgba(8,9,11,.94), rgba(8,9,11,.76));
  }
  .card {
    width: min(520px, 92vw);
    border-radius: 24px;
    padding: 22px;
    background: var(--panel);
    border: 1px solid rgba(255,255,255,.12);
    box-shadow: 0 20px 80px rgba(0,0,0,.45);
  }
  .card h1 { margin: 0 0 10px; font-size: 22px; line-height: 1.2; }
  .card p { margin: 0 0 16px; color: var(--muted); line-height: 1.55; font-size: 14px; }
  #startBtn {
    width: 100%;
    border: 0;
    border-radius: 18px;
    padding: 15px 18px;
    background: #f4f4f5;
    color: #111;
    font-size: 17px;
    font-weight: 750;
  }
  #hint {
    margin-top: 12px;
    min-height: 20px;
    color: #fca5a5;
    font-size: 13px;
    line-height: 1.45;
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="title">頌缽共鳴線</div>
    <div class="seg" aria-label="選擇線數">
      <button data-lines="4">4</button>
      <button data-lines="8" class="active">8</button>
      <button data-lines="12">12</button>
    </div>
    <div class="spacer"></div>
    <div id="status">等待啟動</div>
  </header>
  <main id="stage">
    <canvas id="canvas"></canvas>
    <div id="startLayer">
      <div class="card">
        <h1>即時聲音 → 共鳴線</h1>
        <p>每次敲擊變大聲時，自動清圖、重新抓主頻，並鎖定最多 12 個穩定頻率。<br>不錄音、不存檔、不判斷好壞。</p>
        <button id="startBtn">啟動麥克風</button>
        <div id="hint"></div>
      </div>
    </div>
  </main>
</div>

<script>
(() => {
  'use strict';

  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d', { alpha: false });
  const stage = document.getElementById('stage');
  const statusEl = document.getElementById('status');
  const startLayer = document.getElementById('startLayer');
  const startBtn = document.getElementById('startBtn');
  const hintEl = document.getElementById('hint');
  const lineButtons = Array.from(document.querySelectorAll('[data-lines]'));

  const VIEW_SECONDS = 30;
  const DB_MIN = -60;
  const DB_MAX = 0;
  const MIN_FREQ = 70;
  const MAX_FREQ = 10000;
  const F0_MAX = 2500;
  const CAPTURE_START = 0.30; // seconds after hit; avoids attack noise
  const CAPTURE_END = 1.10;   // lock frequencies after this window
  const HIT_REFRACTORY = 0.65;
  const LOCKED_TRACKS_MAX = 12;

  let lineCount = 8;
  let audioCtx = null;
  let analyser = null;
  let freqData = null;
  let timeData = null;
  let sampleRate = 44100;
  let fftSize = 8192;

  let running = false;
  let sessionStart = 0;
  let lastHit = -999;
  let activeSession = false;
  let f0 = null;
  let sessionPeakDb = -Infinity;
  let rmsHistory = [];
  let noiseFloorDb = -78;
  let tracks = [];
  let peakFrames = [];
  let tracksLocked = false;
  let nextTrackId = 1;

  let width = 0, height = 0, dpr = 1;
  const margin = { left: 46, right: 78, top: 18, bottom: 34 };

  function resize() {
    dpr = Math.max(1, Math.min(3, window.devicePixelRatio || 1));
    const rect = stage.getBoundingClientRect();
    width = Math.max(320, Math.floor(rect.width));
    height = Math.max(320, Math.floor(rect.height));
    canvas.width = Math.floor(width * dpr);
    canvas.height = Math.floor(height * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    draw();
  }

  window.addEventListener('resize', resize, { passive: true });
  window.addEventListener('orientationchange', () => setTimeout(resize, 250), { passive: true });
  resize();

  lineButtons.forEach(btn => {
    btn.addEventListener('click', () => {
      lineCount = Number(btn.dataset.lines);
      lineButtons.forEach(b => b.classList.toggle('active', b === btn));
      draw();
    });
  });

  startBtn.addEventListener('click', start);

  async function start() {
    hintEl.textContent = '';

    if (!window.isSecureContext) {
      hintEl.textContent = 'iPhone 上通常需要用 HTTPS 網址開啟，不能用普通 http。';
      return;
    }

    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      hintEl.textContent = '這個瀏覽器拿不到麥克風。請用 iPhone Safari 開啟。';
      return;
    }

    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)({ latencyHint: 'interactive' });
      await audioCtx.resume();

      let stream;
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          audio: {
            echoCancellation: false,
            noiseSuppression: false,
            autoGainControl: false
          },
          video: false
        });
      } catch (e) {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
      }

      const source = audioCtx.createMediaStreamSource(stream);
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = fftSize;
      analyser.smoothingTimeConstant = 0.06;
      analyser.minDecibels = -105;
      analyser.maxDecibels = -10;
      source.connect(analyser);

      sampleRate = audioCtx.sampleRate || 44100;
      freqData = new Float32Array(analyser.frequencyBinCount);
      timeData = new Float32Array(analyser.fftSize);

      running = true;
      activeSession = false;
      startLayer.style.display = 'none';
      statusEl.textContent = '等待敲擊';
      requestAnimationFrame(tick);
    } catch (err) {
      hintEl.textContent = '麥克風啟動失敗：' + (err && err.message ? err.message : err);
    }
  }

  function nowSec() {
    return audioCtx ? audioCtx.currentTime : performance.now() / 1000;
  }

  function tick() {
    if (!running || !analyser) return;

    const now = nowSec();
    analyser.getFloatTimeDomainData(timeData);
    analyser.getFloatFrequencyData(freqData);

    const rmsDb = getRmsDb(timeData);
    updateNoiseFloor(rmsDb);
    updateRmsHistory(now, rmsDb);

    if (detectHit(now, rmsDb)) {
      newSession(now);
    }

    if (activeSession) {
      const elapsed = now - sessionStart;
      const peaks = findPeaks();

      if (elapsed >= CAPTURE_START) {
        const strongest = peaks.length ? peaks[0].db : -Infinity;
        if (strongest > sessionPeakDb) sessionPeakDb = strongest;
      }

      if (!tracksLocked && elapsed >= CAPTURE_START && elapsed <= CAPTURE_END) {
        peakFrames.push({ t: elapsed, peaks: peaks.slice(0, 80) });
      }

      if (!tracksLocked && elapsed >= CAPTURE_END) {
        lockTracksFromCapture();
      }

      if (tracksLocked && elapsed <= VIEW_SECONDS) {
        updateLockedTracks(elapsed);
      }

      draw();

      if (tracksLocked && f0) {
        statusEl.textContent = `${tracks.length} 頻率 · ${Math.min(elapsed, VIEW_SECONDS).toFixed(1)}s`;
      } else {
        statusEl.textContent = `抓頻率中 · ${elapsed.toFixed(1)}s`;
      }
    } else {
      drawIdle(rmsDb);
    }

    requestAnimationFrame(tick);
  }

  function getRmsDb(buf) {
    let sum = 0;
    for (let i = 0; i < buf.length; i++) sum += buf[i] * buf[i];
    const rms = Math.sqrt(sum / buf.length) || 1e-12;
    return 20 * Math.log10(rms);
  }

  function updateNoiseFloor(rmsDb) {
    if (!activeSession || rmsDb < noiseFloorDb + 8) {
      noiseFloorDb = noiseFloorDb * 0.985 + rmsDb * 0.015;
    }
  }

  function updateRmsHistory(now, db) {
    rmsHistory.push({ t: now, db });
    while (rmsHistory.length && now - rmsHistory[0].t > 1.1) rmsHistory.shift();
  }

  function recentMinRms() {
    let m = Infinity;
    for (const p of rmsHistory) if (p.db < m) m = p.db;
    return Number.isFinite(m) ? m : noiseFloorDb;
  }

  function detectHit(now, rmsDb) {
    if (now - lastHit < HIT_REFRACTORY) return false;
    const jump = rmsDb - recentMinRms();
    const aboveNoise = rmsDb - noiseFloorDb;
    return aboveNoise > 15 && jump > 9 && rmsDb > -58;
  }

  function newSession(now) {
    activeSession = true;
    sessionStart = now;
    lastHit = now;
    f0 = null;
    sessionPeakDb = -Infinity;
    tracks = [];
    peakFrames = [];
    tracksLocked = false;
    nextTrackId = 1;
  }

  function findPeaks() {
    const binHz = sampleRate / analyser.fftSize;
    const startBin = Math.max(2, Math.ceil(MIN_FREQ / binHz));
    const endBin = Math.min(freqData.length - 2, Math.floor(Math.min(MAX_FREQ, sampleRate / 2 - 200) / binHz));
    const peaks = [];

    let localMax = -Infinity;
    for (let i = startBin; i <= endBin; i++) if (freqData[i] > localMax) localMax = freqData[i];
    const threshold = Math.max(-92, localMax - 54);

    for (let i = startBin; i <= endBin; i++) {
      const a = freqData[i - 1], b = freqData[i], c = freqData[i + 1];
      if (b > threshold && b > a && b >= c) {
        const denom = a - 2 * b + c;
        let delta = 0;
        if (Math.abs(denom) > 1e-6) delta = clamp(0.5 * (a - c) / denom, -0.75, 0.75);
        const freq = (i + delta) * binHz;
        const db = b - 0.25 * (a - c) * delta;
        peaks.push({ freq, db });
      }
    }

    peaks.sort((p, q) => q.db - p.db);
    return mergeClosePeaks(peaks).slice(0, 100);
  }

  function mergeClosePeaks(peaks) {
    const out = [];
    for (const p of peaks) {
      let tooClose = false;
      for (const q of out) {
        const oct = Math.abs(Math.log2(p.freq / q.freq));
        if (oct < 0.018) { tooClose = true; break; }
      }
      if (!tooClose) out.push(p);
    }
    return out;
  }

  function lockTracksFromCapture() {
    const groups = aggregateCapturePeaks();
    if (!groups.length) return false;

    groups.sort((a, b) => b.score - a.score);
    const strongest = groups[0];
    sessionPeakDb = Number.isFinite(sessionPeakDb) ? sessionPeakDb : strongest.maxDb;

    const f0Group = estimateF0Group(groups);
    if (!f0Group) return false;
    f0 = f0Group.freq;

    const selected = [];
    addSelected(selected, f0Group, true);

    const candidates = groups
      .filter(g => g.freq >= MIN_FREQ && g.freq <= MAX_FREQ && g.maxDb >= sessionPeakDb - 52)
      .sort((a, b) => b.score - a.score);

    for (const g of candidates) {
      if (selected.length >= LOCKED_TRACKS_MAX) break;
      addSelected(selected, g, false);
    }

    tracks = selected.slice(0, LOCKED_TRACKS_MAX).map((g, idx) => ({
      id: nextTrackId++,
      rank: idx,
      freq: g.freq,
      fixedFreq: g.freq,
      isF0: idx === 0,
      points: [],
      maxRelDb: DB_MIN
    }));

    backfillLockedTracks();
    tracksLocked = true;
    return true;
  }

  function addSelected(selected, group, isF0) {
    if (!group) return false;
    for (const s of selected) {
      if (Math.abs(Math.log2(group.freq / s.freq)) < 0.025) return false;
    }
    selected.push({ ...group, isF0: !!isF0 });
    return true;
  }

  function aggregateCapturePeaks() {
    const groups = [];
    const minDb = Number.isFinite(sessionPeakDb) ? sessionPeakDb - 55 : -92;

    for (const frame of peakFrames) {
      for (const p of frame.peaks) {
        if (p.freq < MIN_FREQ || p.freq > MAX_FREQ || p.db < minDb) continue;
        let group = null;
        for (const g of groups) {
          if (Math.abs(Math.log2(p.freq / g.freq)) < 0.025) { group = g; break; }
        }
        const power = Math.pow(10, p.db / 20);
        if (!group) {
          group = { freq: p.freq, weight: power, hits: 0, maxDb: p.db, sumDb: 0, score: 0 };
          groups.push(group);
        } else {
          group.freq = (group.freq * group.weight + p.freq * power) / (group.weight + power);
          group.weight += power;
          if (p.db > group.maxDb) group.maxDb = p.db;
        }
        group.hits += 1;
        group.sumDb += p.db;
      }
    }

    for (const g of groups) {
      const avgDb = g.sumDb / Math.max(1, g.hits);
      g.score = g.maxDb + g.hits * 1.9 + avgDb * 0.08;
    }

    return groups;
  }

  function estimateF0Group(groups) {
    if (!groups.length) return null;
    const maxScore = groups[0].score;
    const maxDb = Math.max(...groups.map(g => g.maxDb));

    const strongLow = groups
      .filter(g => g.freq >= MIN_FREQ && g.freq <= F0_MAX && g.score >= maxScore - 18 && g.maxDb >= maxDb - 24)
      .sort((a, b) => a.freq - b.freq);

    if (strongLow.length) return strongLow[0];

    return groups
      .filter(g => g.freq >= MIN_FREQ && g.freq <= F0_MAX)
      .sort((a, b) => b.score - a.score)[0] || null;
  }

  function backfillLockedTracks() {
    for (const frame of peakFrames) {
      for (const tr of tracks) {
        const p = findPeakNear(frame.peaks, tr.fixedFreq, 0.035);
        if (p) addPointRaw(tr, frame.t, p.db);
      }
    }
  }

  function updateLockedTracks(elapsed) {
    for (const tr of tracks) {
      const db = measureDbAtFreq(tr.fixedFreq);
      addPointRaw(tr, elapsed, db);
    }
  }

  function findPeakNear(peaks, freq, maxOctDist) {
    let best = null;
    let bestDist = Infinity;
    for (const p of peaks) {
      const dist = Math.abs(Math.log2(p.freq / freq));
      if (dist < bestDist && dist <= maxOctDist) {
        bestDist = dist;
        best = p;
      }
    }
    return best;
  }

  function measureDbAtFreq(freq) {
    const binHz = sampleRate / analyser.fftSize;
    const center = Math.round(freq / binHz);
    const radius = Math.max(2, Math.round((freq * 0.018) / binHz));
    let best = -Infinity;
    const start = Math.max(2, center - radius);
    const end = Math.min(freqData.length - 3, center + radius);
    for (let i = start; i <= end; i++) {
      if (freqData[i] > best) best = freqData[i];
    }
    return Number.isFinite(best) ? best : sessionPeakDb + DB_MIN;
  }

  function addPointRaw(track, elapsed, db) {
    if (!Number.isFinite(sessionPeakDb)) return;
    const relDb = clamp(db - sessionPeakDb, DB_MIN, 0);
    track.points.push({ t: elapsed, db: relDb, freq: track.fixedFreq });
    track.maxRelDb = Math.max(track.maxRelDb, relDb);
    if (track.points.length > 1400) track.points.shift();
  }

  function visibleTracks() {
    return tracks.slice(0, lineCount);
  }

  function drawIdle(rmsDb) {
    drawBase();
    drawTextCenter('等待敲擊', `背景 ${Math.round(rmsDb)} dBFS`);
  }

  function draw() {
    drawBase();
    if (!activeSession) return;

    const now = nowSec();
    const elapsed = Math.min(now - sessionStart, VIEW_SECONDS);
    drawCursor(elapsed);

    const list = visibleTracks();
    for (const tr of list) drawTrack(tr);
    drawTrackLegend(list);
    drawF0Info();

    if (!tracksLocked) {
      drawTextCenter('抓頻率中', '敲擊後 0.3–1.1 秒鎖定主頻與共鳴線');
    } else if (now - sessionStart > VIEW_SECONDS) {
      drawTextCenter('30 秒結束', '下一次敲擊會自動重畫');
    }
  }

  function drawBase() {
    ctx.fillStyle = '#08090b';
    ctx.fillRect(0, 0, width, height);

    const left = margin.left, right = width - margin.right;
    const top = margin.top, bottom = height - margin.bottom;
    const plotW = right - left, plotH = bottom - top;

    const g = ctx.createLinearGradient(0, top, 0, bottom);
    g.addColorStop(0, '#111827');
    g.addColorStop(1, '#050507');
    ctx.fillStyle = g;
    roundRect(ctx, left, top, plotW, plotH, 14);
    ctx.fill();

    ctx.font = '11px -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif';
    ctx.textBaseline = 'middle';

    for (const db of [0, -20, -40, -60]) {
      const y = yForDb(db);
      ctx.strokeStyle = db === 0 ? 'rgba(255,255,255,.18)' : 'rgba(255,255,255,.10)';
      ctx.lineWidth = 1;
      line(left, y, right, y);
      ctx.fillStyle = 'rgba(255,255,255,.62)';
      ctx.textAlign = 'right';
      ctx.fillText(db + ' dB', left - 8, y);
    }

    for (let s = 0; s <= VIEW_SECONDS; s += 5) {
      const x = xForTime(s);
      ctx.strokeStyle = s === 0 ? 'rgba(255,255,255,.18)' : 'rgba(255,255,255,.075)';
      ctx.lineWidth = 1;
      line(x, top, x, bottom);
      ctx.fillStyle = 'rgba(255,255,255,.56)';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.fillText(String(s), x, bottom + 10);
    }

    ctx.fillStyle = 'rgba(255,255,255,.38)';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'top';
    ctx.fillText('秒', right, bottom + 10);
  }

  function drawTrack(tr) {
    const pts = tr.points.filter(p => p.t >= 0 && p.t <= VIEW_SECONDS && p.db >= DB_MIN);
    if (pts.length < 2) return;

    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.globalCompositeOperation = 'lighter';

    for (let i = 1; i < pts.length; i++) {
      const a = pts[i - 1], b = pts[i];
      if (Math.abs(b.t - a.t) > 0.35) continue;
      const alpha = clamp((Math.max(a.db, b.db) - DB_MIN) / 44, 0.12, 0.95);
      ctx.strokeStyle = colorForFreq(tr.fixedFreq, alpha);
      ctx.lineWidth = tr.isF0 ? 3.2 : 2.15;
      line(xForTime(a.t), yForDb(a.db), xForTime(b.t), yForDb(b.db));
    }

    ctx.globalCompositeOperation = 'source-over';
  }

  function drawTrackLegend(list) {
    if (!list.length) return;
    const x = width - margin.right + 12;
    const top = margin.top + 18;
    const step = lineCount === 12 ? 17 : 20;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.font = `${lineCount === 12 ? 11 : 12}px -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif`;

    ctx.fillStyle = 'rgba(255,255,255,.36)';
    ctx.fillText('Hz', x, margin.top + 3);

    list.forEach((tr, i) => {
      const y = top + i * step;
      ctx.fillStyle = colorForFreq(tr.fixedFreq, tr.isF0 ? 1 : 0.92);
      ctx.font = `${tr.isF0 ? '700 ' : '600 '}${lineCount === 12 ? 11 : 12}px -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif`;
      ctx.fillText(formatFreqShort(tr.fixedFreq), x, y);
    });
  }

  function drawF0Info() {
    if (!f0) return;
    const left = margin.left + 10;
    const top = margin.top + 10;
    const n = noteInfo(f0);
    const text = `F0 ${f0.toFixed(1)} Hz · ${n.name} ${formatCents(n.cents)}`;

    ctx.font = '700 13px -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif';
    const tw = ctx.measureText(text).width;
    const w = Math.min(tw + 24, width - margin.left - margin.right - 18);
    const h = 28;

    ctx.fillStyle = 'rgba(0,0,0,.48)';
    roundRect(ctx, left, top, w, h, 999);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,.12)';
    ctx.lineWidth = 1;
    roundRect(ctx, left, top, w, h, 999);
    ctx.stroke();

    ctx.fillStyle = 'rgba(255,255,255,.92)';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, left + 12, top + h / 2);
  }

  function drawCursor(t) {
    const x = xForTime(t);
    ctx.strokeStyle = 'rgba(255,255,255,.22)';
    ctx.setLineDash([4, 5]);
    line(x, margin.top, x, height - margin.bottom);
    ctx.setLineDash([]);
  }

  function drawTextCenter(main, sub) {
    const x = (margin.left + width - margin.right) / 2;
    const y = (margin.top + height - margin.bottom) / 2;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = 'rgba(255,255,255,.86)';
    ctx.font = '700 20px -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif';
    ctx.fillText(main, x, y - 12);
    ctx.fillStyle = 'rgba(255,255,255,.46)';
    ctx.font = '13px -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif';
    ctx.fillText(sub, x, y + 18);
  }

  function xForTime(t) {
    const left = margin.left, right = width - margin.right;
    return left + clamp(t / VIEW_SECONDS, 0, 1) * (right - left);
  }

  function yForDb(db) {
    const top = margin.top, bottom = height - margin.bottom;
    const v = (clamp(db, DB_MIN, DB_MAX) - DB_MIN) / (DB_MAX - DB_MIN);
    return bottom - v * (bottom - top);
  }

  function colorForFreq(freq, alpha = 1) {
    if (!f0 || !Number.isFinite(freq)) return `rgba(255,255,255,${alpha})`;
    const r = Math.log2(freq / f0);
    const pos = ((r % 1) + 1) % 1;
    const hue = pos * 360;
    return `hsla(${hue.toFixed(1)}, 95%, 62%, ${alpha})`;
  }

  function noteInfo(freq) {
    const names = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
    const midiFloat = 69 + 12 * Math.log2(freq / 440);
    const midi = Math.round(midiFloat);
    const name = names[((midi % 12) + 12) % 12] + (Math.floor(midi / 12) - 1);
    const cents = Math.round((midiFloat - midi) * 100);
    return { name, cents };
  }

  function formatCents(cents) {
    if (!Number.isFinite(cents) || cents === 0) return '±0¢';
    return (cents > 0 ? '+' : '') + cents + '¢';
  }

  function formatFreqShort(freq) {
    if (!Number.isFinite(freq)) return '--';
    if (freq >= 10000) return (freq / 1000).toFixed(1) + 'k';
    if (freq >= 1000) return Math.round(freq).toString();
    return Math.round(freq).toString();
  }

  function line(x1, y1, x2, y2) {
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function clamp(v, lo, hi) {
    return Math.max(lo, Math.min(hi, v));
  }
})();
</script>
